<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script>
        const queryString = window.location.search;
        var urlParams = new URLSearchParams(queryString);
        var erro = urlParams.get('erro');
        if (erro == 1) {
            erro = "Login ou senha inválida"
        }
        if (erro !== null) {
            alert(erro)
        }
    </script>
</head>
<body>
    <form action="http://localhost:9091/api/login" method="post">
        <input type="text" id="usuario" name="usuario"><p>
        <input type="text" id="senha" name="senha"><p>
        <input type="submit" value="login">
    </form>
</body>
</html>
